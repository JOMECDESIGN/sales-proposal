# ── 文档同步映射表 ──────────────────────────────────────────
# 复制为 sync-map.yaml(不入库)后填入真实 doc_id。
#   cp sync-map.example.yaml sync-map.yaml
#
# 结构:按"分组"组织;每条记录一个本地文件 ↔ 一个飞书文档。
#   - doc_id 留空时,push 会新建文档(import)并提示你回填;pull 会跳过。
#   - 路径相对仓库根目录。

groups:
  # 培训教材正文:推到知识库当团队 wiki(新人入门 / 内部沉淀)
  curriculum:
    - file: curriculum/00-README-学习路径.md
      title: 售前训练营-学习路径
      doc_id: ""
    - file: curriculum/01-认知篇-售前与方案.md
      title: 售前训练营-01认知篇
      doc_id: ""
    - file: curriculum/02-方法论-招式卡片.md
      title: 售前训练营-02方法论16招
      doc_id: ""
    - file: curriculum/03-Agent团队使用手册.md
      title: 售前训练营-03Agent使用手册
      doc_id: ""
    - file: curriculum/04-流程篇-从挖需求到拿单.md
      title: 售前训练营-04流程篇
      doc_id: ""
    - file: curriculum/05-飞书打通-使用手册.md
      title: 售前训练营-05飞书打通
      doc_id: ""

  # 标杆案例:推到知识库给新人和客户看
