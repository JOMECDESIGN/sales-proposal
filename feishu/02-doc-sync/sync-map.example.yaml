      title: 太空舱方案-逐段批注
      doc_id: ""          # 首次 push 后把新建文档的 id 回填到这里
    - file: curriculum/案例标杆/船舶方案-架构思路.md
      title: 船舶方案-架构思路
      doc_id: ""

  # 可填模板:推给销售当协作底板
  templates:
    - file: curriculum/模板库/交付物与验收表.md
      title: 模板-交付物与验收表
      doc_id: ""
    - file: curriculum/模板库/待定项与风险登记.md
      title: 模板-待定项与风险登记
      doc_id: ""

  # 在做的方案:与客户双向协作的活文档(示例,按项目自行增减)
  proposals:
