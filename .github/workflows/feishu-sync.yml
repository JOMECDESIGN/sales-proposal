name: feishu-sync

# 把教材定时同步到飞书知识库,让知识库内容自动保鲜。
# 默认 update-only:只更新 sync-map 里已有 doc_id 的条目,绝不新建文档(避免重复)。

on:
  schedule:
    - cron: "0 1 * * 1"        # 每周一 01:00 UTC = 北京时间 09:00
  workflow_dispatch:
    inputs:
      group:
        description: "只同步某个分组(留空=全部)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 守卫 —— 未配置凭证则跳过(不报红)
        id: guard
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_SYNC_MAP: ${{ secrets.FEISHU_SYNC_MAP }}
        run: |
          if [ -z "$FEISHU_APP_ID" ] || [ -z "$FEISHU_APP_SECRET" ] || [ -z "$FEISHU_SYNC_MAP" ]; then
            echo "::notice:: 未配置 FEISHU_APP_ID/SECRET/SYNC_MAP,跳过飞书同步。"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 安装 Go + feishu-cli
        if: steps.guard.outputs.ok == 'true'
        run: |
          sudo apt-get update -y && sudo apt-get install -y golang-go
          go install github.com/riba2534/feishu-cli@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: 安装 Python + PyYAML
        if: steps.guard.outputs.ok == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 准备依赖与映射表
        if: steps.guard.outputs.ok == 'true'
        env:
          FEISHU_SYNC_MAP: ${{ secrets.FEISHU_SYNC_MAP }}
        run: |
          pip install PyYAML
          printf '%s' "$FEISHU_SYNC_MAP" > feishu/02-doc-sync/sync-map.yaml

      - name: 同步教材到飞书知识库(update-only)
        if: steps.guard.outputs.ok == 'true'
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_DOMAIN: ${{ vars.FEISHU_DOMAIN || 'https://open.feishu.cn' }}
          SYNC_UPDATE_ONLY: "1"
        run: |
          chmod +x feishu/02-doc-sync/sync.sh
          feishu/02-doc-sync/sync.sh push "${{ github.event.inputs.group }}"
